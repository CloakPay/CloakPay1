[build]
  # Tell Netlify to change directory into cloakpay2 before running commands
  base = "cloakpay2"
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 3. Security Headers
# This enhances your "dark tech" professional status by securing the site
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Content-Security-Policy = "upgrade-insecure-requests"
    Referrer-Policy = "strict-origin-when-cross-origin"

# 4. Environment Variables (Optional context-specific)
[context.production.environment]
  NODE_VERSION = "20"